<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AML Intelligence Platform</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏦</text></svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- vis-network CSS -->
  <link href="https://unpkg.com/vis-network/styles/vis-network.min.css" rel="stylesheet">

  <!-- App Styles -->
  <link rel="stylesheet" href="css/styles.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #060B18;
      color: #E8ECF4;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">🏦</div>
        <div class="logo-text">
          <h1>AML Intel</h1>
          <span>Intelligence Platform</span>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <a class="nav-item active" data-page="overview" href="#">
          <i data-lucide="layout-dashboard"></i>
          <span>Overview</span>
        </a>
        <a class="nav-item" data-page="network" href="#">
          <i data-lucide="network"></i>
          <span>Live AML Network</span>
        </a>
        <a class="nav-item" data-page="fraud-detection" href="#">
          <i data-lucide="shield-alert"></i>
          <span>Fraud Detection</span>
        </a>
        <a class="nav-item" data-page="fraud-rings" href="#">
          <i data-lucide="radio"></i>
          <span>Fraud Rings</span>
        </a>
        <a class="nav-item" data-page="gnn" href="#">
          <i data-lucide="brain"></i>
          <span>GNN Intelligence</span>
        </a>
        <a class="nav-item" data-page="investigation" href="#">
          <i data-lucide="search"></i>
          <span>AI Investigation</span>
        </a>
        <a class="nav-item" data-page="xai" href="#">
          <i data-lucide="bar-chart-3"></i>
          <span>Explainable AI</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="system-status">
          <span class="status-dot active"></span>
          <span>System Online</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
    </main>
  </div>

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

  <!-- vis-network -->
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- App Module -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
